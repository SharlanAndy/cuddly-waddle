<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1A2535"/>
  
  <defs>
    <linearGradient id="fcg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
  </defs>
  <!-- speed lines -->
  <line x1="30" y1="100" x2="70" y2="100" stroke="#FFB347" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="115" x2="60" y2="115" stroke="#FFB347" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="25" y1="85" x2="65" y2="85" stroke="#FFB347" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- lightning bolt -->
  <polygon points="110,35 90,105 115,105 80,165 140,88 110,88 145,35" fill="url(#fcg)"/>

</svg>
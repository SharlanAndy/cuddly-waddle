<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1A2535"/>
  
  <!-- Fish symbol (left) -->
  <g transform="translate(25,70)">
    <ellipse cx="35" cy="30" rx="28" ry="18" fill="#FFB347" opacity="0.9"/>
    <polygon points="63,30 78,15 78,45" fill="#FFB347" opacity="0.9"/>
    <circle cx="22" cy="24" r="4" fill="#1A2535"/>
    <line x1="35" y1="12" x2="35" y2="48" stroke="#1A2535" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="18" x2="50" y2="18" stroke="#1A2535" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="30" x2="60" y2="30" stroke="#1A2535" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="42" x2="50" y2="42" stroke="#1A2535" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Prawn symbol (top center) -->
  <g transform="translate(75,15)">
    <ellipse cx="25" cy="45" rx="14" ry="30" fill="#E53935" opacity="0.9"/>
    <path d="M18,20 Q10,8 18,0" fill="none" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
    <path d="M32,20 Q40,8 32,0" fill="none" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
    <line x1="11" y1="30" x2="0" y2="35" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <line x1="39" y1="30" x2="50" y2="35" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <line x1="11" y1="42" x2="0" y2="50" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <line x1="39" y1="42" x2="50" y2="50" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Crab symbol (right) -->
  <g transform="translate(110,65)">
    <ellipse cx="35" cy="32" rx="26" ry="20" fill="#E53935" opacity="0.8"/>
    <line x1="12" y1="20" x2="0" y2="8" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
    <line x1="58" y1="20" x2="70" y2="8" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
    <line x1="9" y1="32" x2="0" y2="25" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
    <line x1="61" y1="32" x2="70" y2="25" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
    <line x1="9" y1="40" x2="0" y2="48" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <line x1="61" y1="40" x2="70" y2="48" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <circle cx="24" cy="26" r="5" fill="#FFFFFF"/>
    <circle cx="46" cy="26" r="5" fill="#FFFFFF"/>
    <circle cx="24" cy="26" r="3" fill="#1A2535"/>
    <circle cx="46" cy="26" r="3" fill="#1A2535"/>

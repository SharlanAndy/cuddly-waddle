<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1A2535"/>
  
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <!-- three dice in triangle arrangement -->
  <rect x="30" y="25" width="60" height="60" rx="10" fill="url(#sbg)" stroke="#FFB347" stroke-width="3"/>
  <circle cx="50" cy="45" r="7" fill="#FFFFFF"/>
  <circle cx="70" cy="65" r="7" fill="#FFFFFF"/>

  <rect x="110" y="25" width="60" height="60" rx="10" fill="url(#sbg)" stroke="#FFB347" stroke-width="3"/>
  <circle cx="130" cy="45" r="7" fill="#FFFFFF"/>
  <circle cx="140" cy="55" r="7" fill="#FFFFFF"/>
  <circle cx="150" cy="65" r="7" fill="#FFFFFF"/>

  <rect x="70" y="105" width="60" height="60" rx="10" fill="url(#sbg)" stroke="#FFB347" stroke-width="3"/>
  <circle cx="88" cy="122" r="7" fill="#FFFFFF"/>
  <circle cx="100" cy="135" r="7" fill="#FFFFFF"/>
  <circle cx="112" cy="148" r="7" fill="#FFFFFF"/>
  <circle cx="100" cy="122" r="7" fill="#FFFFFF"/>

  <!-- dice box shake indicator -->
  <text x="100" y="190" font-family="Arial" font-size="11" fill="#FFB347" text-anchor="middle" opacity="0.7">SIC BO</text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="20" fill="#1A2535"/>
  
  <!-- Player hand label -->
  <text x="45" y="28" font-family="Arial" font-size="11" fill="#FFB347" text-anchor="middle" opacity="0.8">P</text>
  <!-- Player cards -->
  <rect x="15" y="35" width="50" height="70" rx="6" fill="#FFFFFF"/>
  <text x="40" y="70" font-family="Arial" font-weight="bold" font-size="20" fill="#333" text-anchor="middle">8</text>
  <text x="40" y="92" font-family="Arial" font-size="18" fill="#E53935" text-anchor="middle">&#9829;</text>
  <rect x="45" y="40" width="50" height="70" rx="6" fill="#FFFFFF"/>
  <text x="70" y="75" font-family="Arial" font-weight="bold" font-size="20" fill="#333" text-anchor="middle">9</text>
  <text x="70" y="97" font-family="Arial" font-size="18" fill="#333" text-anchor="middle">&#9824;</text>
  <!-- VS -->
  <text x="100" y="85" font-family="Arial" font-weight="bold" font-size="14" fill="#FFB347" text-anchor="middle">VS</text>
  <!-- Banker hand label -->
  <text x="155" y="28" font-family="Arial" font-size="11" fill="#FFB347" text-anchor="middle" opacity="0.8">B</text>
  <!-- Banker cards -->
  <rect x="105" y="35" width="50" height="70" rx="6" fill="#FFFFFF"/>
  <text x="130" y="70" font-family="Arial" font-weight="bold" font-size="20" fill="#E53935" text-anchor="middle">7</text>
  <text x="130" y="92" font-family="Arial" font-size="18" fill="#E53935" text-anchor="middle">&#9830;</text>
  <rect x="135" y="40" width="50" height="70" rx="6" fill="#FFFFFF"/>
  <text x="160" y="75" font-family="Arial" font-weight="bold" font-size="20" fill="#333" text-anchor="middle">6</text>
  <text x="160" y="97" font-family="Arial" font-size="18" fill="#333" text-anchor="middle">&#9827;</text>
  <!-- Score -->
  <text x="50" y="130" font-family="Arial" font-weight="bold" font-size="13" fill="#FFB347" text-anchor="middle">Score: 7</text>
  <text x="150" y="130" font-family="Arial" font-weight="bold" font-size="13" fill="#FFB347" text-anchor="middle">Score: 3</text>
  <!-- Natural indicator -->
  <rect x="30" y="155" width="60" height="22" rx="6" fill="#FFB347" opacity="0.2" stroke="#FFB347" stroke-width="2"/>
  <text x="60" y="171" font-family="Arial" font-size="11" fill="#FFB347" text-anchor="middle">NATURAL</text>
  <rect x="110" y="155" width="60" height="22" rx="6" fill="#E53935" opacity="0.2" stroke="#E53935" stroke-width="2"/>
  <text x="140" y="171" font-family="Arial" font-size="11" fill="#E53935" text-anchor="middle">BANKER</text>

</svg>